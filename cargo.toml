[package]
name = "zerotrace"
version = "0.1.0"
edition = "2026"
authors = ["C4rbn"]

[workspace]
members = ["src/xdp-interceptor"]
exclude = ["third_party"]

[workspace.package]
version = "0.1.0"
edition = "2026"
authors = ["C4rbn"]
rust-version = "1.70"
homepage = "https://github.com/C4rbn/ZeroTrace"
repository = "https://github.com/C4rbn/ZeroTrace"
license = "Apache-2.0"

[workspace.dependencies]
libc = "0.2.163"
foreign-types = "0.5.0"
foreign-types-shared = "0.3.1"

[dependencies]
boring = { version = "5.1.0" }
boring-sys = { version = "5.1.0" }
clap = { version = "4.5", features = ["derive", "env", "wrap_help"] }
anyhow = "1.0.90"
ctrlc = "3.5.2"
tracing = "0.1"
tracing-subscriber = "0.3"
aya = { version = "0.13.1", features = ["async_tokio"] }
aya-log = "0.2.1"
tokio = { version = "1.40", features = ["full"] }
nix = { version = "0.29", features = ["net", "user"] }
libc = { workspace = true }
rand = "0.8.5"
bytes = "1.7"
foreign-types = { workspace = true }
foreign-types-shared = { workspace = true }
rlimit = "0.10"
xdp-interceptor = { path = "src/xdp-interceptor" }

[patch.crates-io]
boring = { path = "third_party/boring/boring" }
boring-sys = { path = "third_party/boring/boring-sys" }

[lints.rust]
unexpected_cfgs = { level = "warn", check-cfg = ['cfg(boringssl)'] }

[profile.release]
opt-level = 3
lto = true
codegen-units = 1
panic = "abort"
strip = "symbols"
